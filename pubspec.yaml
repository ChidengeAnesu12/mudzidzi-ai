name: mudzidzi_ai
description: AI-powered adaptive O-Level Mathematics learning platform for Zimbabwean students.
publish_to: 'none'
version: 0.1.0

environment:
  sdk: '>=3.10.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # State Management
  flutter_riverpod: ^2.5.1

  # Navigation
  go_router: ^14.2.0

  # UI / Fonts
  google_fonts: ^6.2.1
  cupertino_icons: ^1.0.8

  # Charts & Progress Indicators (Progress screen radar/bar charts, mastery rings)
  fl_chart: ^0.68.0
  percent_indicator: ^4.2.3

  # Animations (splash, micro-interactions)
  flutter_animate: ^4.5.0
  lottie: ^3.1.2

  # Utilities
  intl: ^0.19.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0

flutter:
  uses-material-design: true

  assets:
    - assets/images/
    - assets/icons/
    - assets/animations/